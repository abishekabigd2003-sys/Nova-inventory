name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            inventory-management-system/frontend/package-lock.json
            inventory-management-system/backend/admin-service/package-lock.json
            inventory-management-system/backend/api-gateway/package-lock.json

      - name: Upgrade npm to v11 to match local lockfiles
        run: npm install -g npm@11

      - name: Install Frontend Dependencies
        working-directory: ./inventory-management-system/frontend
        run: npm install

      - name: Run Frontend Lint
        working-directory: ./inventory-management-system/frontend
        run: npm run lint

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'inventory-management-system/frontend/package-lock.json'

      - name: Upgrade npm to v11 to match local lockfiles
        run: npm install -g npm@11

      - name: Install Dependencies
        working-directory: ./inventory-management-system/frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./inventory-management-system/frontend
        run: npm run build

  backend-build:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [admin-service, api-gateway]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'inventory-management-system/backend/${{ matrix.service }}/package-lock.json'

      - name: Upgrade npm to v11 to match local lockfiles
        run: npm install -g npm@11

      - name: Install Dependencies
        working-directory: ./inventory-management-system/backend/${{ matrix.service }}
        run: npm install

      - name: Check Syntax (Build)
        working-directory: ./inventory-management-system/backend/${{ matrix.service }}
        run: node -c src/server.js

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'inventory-management-system/qa-tests/package-lock.json'

      - name: Install All Dependencies
        working-directory: ./inventory-management-system
        run: |
          npm install --prefix backend/admin-service
          npm install --prefix backend/api-gateway
          npm install --prefix frontend
          npm install --prefix qa-tests

      - name: Start Services in Background
        working-directory: ./inventory-management-system
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/ims_test_db
          JWT_SECRET: supersecrettestkey
          ADMIN_SERVICE_URL: http://127.0.0.1:5001
          API_GATEWAY_URL: http://127.0.0.1:5000
          FRONTEND_URL: http://127.0.0.1:5173
        run: |
          npm start --prefix backend/admin-service > admin.log 2>&1 &
          npx wait-on -i 1000 -t 30000 http://127.0.0.1:5001/health || { echo "Admin Service crashed! Logs:"; cat admin.log; exit 1; }
          npm start --prefix backend/api-gateway > api.log 2>&1 &
          npx wait-on -i 1000 -t 30000 http://127.0.0.1:5000/health || { echo "API Gateway crashed! Logs:"; cat api.log; exit 1; }
          npm run dev --prefix frontend -- --host 127.0.0.1 > frontend.log 2>&1 &
          npx wait-on -i 1000 -t 30000 http-get://127.0.0.1:5173 || { echo "Frontend crashed! Logs:"; cat frontend.log; exit 1; }

      - name: Install Playwright Browsers
        working-directory: ./inventory-management-system/qa-tests
        run: npx playwright install --with-deps

      - name: Run QA Tests
        working-directory: ./inventory-management-system/qa-tests
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/ims_test_db
          FRONTEND_URL: http://127.0.0.1:5173
        run: |
          npm run seed
          npm test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: inventory-management-system/qa-tests/playwright-report/
          retention-days: 1

  deploy:
    name: Validate Environment & Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Verify Secrets
        id: check_secrets
        env:
          RENDER_DEPLOY_HOOK_ADMIN: ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}
          RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          echo "Checking required deployment secrets..."
          MISSING=0
          
          required_secrets=(
            "RENDER_DEPLOY_HOOK_ADMIN"
            "RENDER_DEPLOY_HOOK_API"
            "RENDER_DEPLOY_HOOK_FRONTEND"
          )
          
          for secret in "${required_secrets[@]}"; do
            # Using bash indirect expansion to check the value of the environment variable named $secret
            if [ -z "${!secret}" ]; then
              echo "::warning::${secret} is missing."
              MISSING=1
            fi
          done
          
          if [ $MISSING -eq 1 ]; then
            echo "One or more deployment secrets are missing. Deployment will be skipped safely."
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "All secrets verified."
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Admin Service Deploy
        if: steps.check_secrets.outputs.skip_deploy == 'false'
        env:
          RENDER_DEPLOY_HOOK_ADMIN: ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}
        run: curl -Ssf -X POST "$RENDER_DEPLOY_HOOK_ADMIN"

      - name: Trigger API Gateway Deploy
        if: steps.check_secrets.outputs.skip_deploy == 'false'
        env:
          RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: curl -Ssf -X POST "$RENDER_DEPLOY_HOOK_API"

      - name: Trigger Frontend Deploy
        if: steps.check_secrets.outputs.skip_deploy == 'false'
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: curl -Ssf -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
