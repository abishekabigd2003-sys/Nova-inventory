name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            inventory-management-system/frontend/package-lock.json
            inventory-management-system/backend/admin-service/package-lock.json
            inventory-management-system/backend/api-gateway/package-lock.json

      - name: Upgrade npm to v11 to match local lockfiles
        run: npm install -g npm@11

      - name: Install Frontend Dependencies
        working-directory: ./inventory-management-system/frontend
        run: npm install

      - name: Run Frontend Lint
        working-directory: ./inventory-management-system/frontend
        run: npm run lint

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'inventory-management-system/frontend/package-lock.json'

      - name: Upgrade npm to v11 to match local lockfiles
        run: npm install -g npm@11

      - name: Install Dependencies
        working-directory: ./inventory-management-system/frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./inventory-management-system/frontend
        run: npm run build

  backend-build:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [admin-service, api-gateway]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'inventory-management-system/backend/${{ matrix.service }}/package-lock.json'

      - name: Upgrade npm to v11 to match local lockfiles
        run: npm install -g npm@11

      - name: Install Dependencies
        working-directory: ./inventory-management-system/backend/${{ matrix.service }}
        run: npm install

      - name: Check Syntax (Build)
        working-directory: ./inventory-management-system/backend/${{ matrix.service }}
        run: node -c src/server.js

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'inventory-management-system/qa-tests/package-lock.json'

      - name: Install All Dependencies
        working-directory: ./inventory-management-system
        run: |
          npm install --prefix backend/admin-service
          npm install --prefix backend/api-gateway
          npm install --prefix frontend
          npm install --prefix qa-tests

      - name: Start Services in Background
        working-directory: ./inventory-management-system
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: supersecrettestkey
          ADMIN_SERVICE_URL: http://localhost:5001
          API_GATEWAY_URL: http://localhost:5000
          FRONTEND_URL: http://localhost:5173
        run: |
          npm start --prefix backend/admin-service &
          npm start --prefix backend/api-gateway &
          npm run dev --prefix frontend &
          npx wait-on http://localhost:5001/health http://localhost:5000/health http-get://localhost:5173

      - name: Install Playwright Browsers
        working-directory: ./inventory-management-system/qa-tests
        run: npx playwright install --with-deps

      - name: Run QA Tests
        working-directory: ./inventory-management-system/qa-tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          npm run seed
          npm test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: inventory-management-system/qa-tests/playwright-report/
          retention-days: 1

  deploy:
    name: Validate Environment & Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verify Secrets
        run: |
          echo "Checking required deployment secrets..."
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_ADMIN is missing."
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_API }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_API is missing."
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_FRONTEND is missing."
            exit 1
          fi
          echo "All secrets verified."

      - name: Trigger Admin Service Deploy
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}"

      - name: Trigger API Gateway Deploy
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Frontend Deploy
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
