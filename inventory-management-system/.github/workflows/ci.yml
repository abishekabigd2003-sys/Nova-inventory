name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Admin Service Dependencies
        working-directory: backend/admin-service
        run: npm ci

      - name: Install API Gateway Dependencies
        working-directory: backend/api-gateway
        run: npm ci

      - name: Install Backend Root Dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Install QA Test Dependencies
        working-directory: qa-tests
        run: npm ci || npm install

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: qa-tests
        run: npx playwright install --with-deps

      - name: Run E2E Tests (CI)
        working-directory: qa-tests
        run: npm run test:ci
        env:
          PORT: 5001
          MONGO_URI: mongodb://127.0.0.1:27017/ims_admin_db
          JWT_SECRET: super_secret_jwt_key_ims_ci
          NODE_ENV: development
          EMAIL_HOST: smtp.gmail.com
          EMAIL_PORT: 587
          EMAIL_USER: fake@gmail.com
          EMAIL_PASS: fakepassword
          EMAIL_FROM: NovaStock CI <fake@gmail.com>

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: qa-tests/playwright-report/
          retention-days: 7
