name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install wait-on globally
      run: npm install -g wait-on

    - name: Install dependencies (Admin Service)
      working-directory: backend/admin-service
      run: npm install

    - name: Install dependencies (API Gateway)
      working-directory: backend/api-gateway
      run: npm install

    - name: Install dependencies (Frontend)
      working-directory: frontend
      run: npm install

    - name: Build Frontend
      working-directory: frontend
      run: npm run build

    - name: Install dependencies (QA Tests)
      working-directory: qa-tests
      run: npm install

    - name: Install Playwright Browsers
      working-directory: qa-tests
      run: npx playwright install --with-deps

    - name: Run Tests
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: .\run_tests.ps1
