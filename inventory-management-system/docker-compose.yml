version: '3.9'

services:


  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile
    container_name: ims-admin-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=your_jwt_secret_here
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads

    networks:
      - ims-network

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: ims-api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - ADMIN_SERVICE_URL=http://admin-service:5001
      - FRONTEND_DIST_PATH=/app/frontend-dist
    volumes:
      - ./frontend/dist:/app/frontend-dist:ro
    depends_on:
      - admin-service
    networks:
      - ims-network

volumes:

  uploads_data:

networks:
  ims-network:
    driver: bridge
