services:
  - type: web
    name: ims-admin-service
    env: node
    rootDir: backend/admin-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    name: ims-api-gateway
    env: node
    rootDir: backend/api-gateway
    buildCommand: npm install && cd ../../frontend && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_SERVICE_URL
        fromService:
          type: web
          name: ims-admin-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_DIST_PATH
        value: ../../../frontend/dist
