services:
  # 1. Admin Service (Handles Database and Business Logic)
  - type: web
    name: ims-admin-service
    env: node
    rootDir: inventory-management-system/backend/admin-service
    buildCommand: npm install -g npm@11 && npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false # Deployed via GitHub Actions
    envVars:
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false # Requires manual entry in Render Dashboard
      - key: JWT_SECRET
        sync: false # Requires manual entry in Render Dashboard
      - key: NODE_ENV
        value: production
      - key: API_GATEWAY_URL
        sync: false # Must be set in Render dashboard to match the API Gateway URL
      - key: FRONTEND_URL
        sync: false # Must be set in Render dashboard to match the Frontend URL

  # 2. API Gateway (Handles rate limiting, security headers, routing)
  - type: web
    name: ims-api-gateway
    env: node
    rootDir: inventory-management-system/backend/api-gateway
    buildCommand: npm install -g npm@11 && npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false # Deployed via GitHub Actions
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: ADMIN_SERVICE_URL
        value: "http://ims-admin-service:5001" # Internal Render networking URL
      - key: FRONTEND_URL
        sync: false # Must be set in Render dashboard to match the Frontend URL

  # 3. Frontend (Static Site)
  - type: static
    name: ims-frontend
    rootDir: inventory-management-system/frontend
    buildCommand: npm install -g npm@11 && npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: false # Deployed via GitHub Actions
    envVars:
      - key: VITE_API_URL
        sync: false # Must be set in Render dashboard to match the API Gateway URL
